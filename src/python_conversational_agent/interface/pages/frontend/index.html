<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 3D Viewer</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #error-message {
            color: #ef4444;
            display: none;
            text-align: center;
            padding: 20px;
            font-weight: 500;
        }
    </style>
    <!-- Include Three.js and modules via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>

<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Loading 3D Model...</div>
        <div id="error-message"></div>
    </div>
    <div id="canvas-container"></div>

    <script>
        // Streamlit API Communication
        function sendToStreamlit(type, data) {
            const message = Object.assign({
                isStreamlitMessage: true,
                type: type
            }, data);
            window.parent.postMessage(message, "*");
        }

        // Initialize variables
        let scene, camera, renderer, controls, clock;
        let mixer, model;
        const actions = {};
        let activeAction, previousAction;
        let currentAnimationName = "";

        const MODEL_URL = "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/2bac6f8c57bf471df0d2a1e8a8ec023c7801dddf/Models/Fox/glTF/Fox.gltf";

        function init() {
            const container = document.getElementById('canvas-container');

            // Clock for animation mixer updates
            clock = new THREE.Clock();

            // Scene setup
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0f172a, 0.015);

            // Camera setup
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 4, 10);

            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            // Controls setup
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground
            controls.minDistance = 2;
            controls.maxDistance = 30;

            // Lighting setup
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.4);
            hemiLight.position.set(0, 20, 0);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 4;
            dirLight.shadow.camera.bottom = -4;
            dirLight.shadow.camera.left = -4;
            dirLight.shadow.camera.right = 4;
            dirLight.shadow.camera.near = 0.1;
            dirLight.shadow.camera.far = 40;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            scene.add(dirLight);

            // Floor/Ground plane
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshStandardMaterial({
                color: 0x1e293b,
                roughness: 0.8,
                metalness: 0.2
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Grid helper
            const grid = new THREE.GridHelper(50, 50, 0x475569, 0x334155);
            grid.position.y = 0.01;
            scene.add(grid);

            // Load GLTF Model
            const loader = new THREE.GLTFLoader();
            loader.load(
                MODEL_URL,
                function (gltf) {
                    model = gltf.scene;

                    // Scale the model down
                    model.scale.setScalar(0.01);

                    // Center and place model properly
                    const box = new THREE.Box3().setFromObject(model);
                    const size = box.getSize(new THREE.Vector3());
                    const center = box.getCenter(new THREE.Vector3());

                    // Normalize position (place on ground)
                    model.position.x += (model.position.x - center.x);
                    model.position.z += (model.position.z - center.z);
                    model.position.y -= box.min.y;

                    // Enable shadow casting/receiving
                    model.traverse(function (object) {
                        if (object.isMesh) {
                            object.castShadow = true;
                            object.receiveShadow = true;
                        }
                    });

                    scene.add(model);

                    // Setup animations
                    mixer = new THREE.AnimationMixer(model);

                    // Map animations from GLTF. For Fox.glb, the animation clips are:
                    // Index 0: Survey (idle)
                    // Index 1: Walk
                    // Index 2: Run
                    gltf.animations.forEach((clip) => {
                        const name = clip.name.toLowerCase();
                        if (name.includes('survey') || name.includes('idle')) {
                            actions['idle'] = mixer.clipAction(clip);
                        } else if (name.includes('walk')) {
                            actions['walking'] = mixer.clipAction(clip);
                        } else if (name.includes('run')) {
                            actions['running'] = mixer.clipAction(clip);
                        }
                    });

                    // Fallback mapping if standard names are not parsed
                    if (gltf.animations.length > 0) {
                        if (!actions['idle']) actions['idle'] = mixer.clipAction(gltf.animations[0]);
                        if (!actions['walking'] && gltf.animations.length > 1) actions['walking'] = mixer.clipAction(gltf.animations[1]);
                        if (!actions['running'] && gltf.animations.length > 2) actions['running'] = mixer.clipAction(gltf.animations[2]);
                    }

                    // Hide loading overlay
                    const overlay = document.getElementById('loading-overlay');
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.style.display = 'none', 500);

                    // Play initial animation
                    if (currentAnimationName && actions[currentAnimationName]) {
                        fadeToAction(currentAnimationName, 0.0);
                    } else if (actions['idle']) {
                        fadeToAction('idle', 0.0);
                    }

                    animate();
                },
                function (xhr) {
                    if (xhr.total > 0) {
                        const percent = Math.round((xhr.loaded / xhr.total) * 100);
                        document.getElementById('loading-text').innerText = `Loading 3D Model... ${percent}%`;
                    }
                },
                function (error) {
                    console.error('An error happened', error);
                    document.querySelector('.spinner').style.display = 'none';
                    document.getElementById('loading-text').style.display = 'none';
                    const errEl = document.getElementById('error-message');
                    errEl.innerText = 'Error loading 3D model. Please verify your connection.';
                    errEl.style.display = 'block';
                }
            );

            // Handle window resizing
            window.addEventListener('resize', onWindowResize);
        }

        function fadeToAction(name, duration = 0.5) {
            previousAction = activeAction;
            activeAction = actions[name];

            if (previousAction !== activeAction) {
                if (previousAction) {
                    previousAction.fadeOut(duration);
                }
                if (activeAction) {
                    activeAction
                        .reset()
                        .setEffectiveTimeScale(1)
                        .setEffectiveWeight(1)
                        .fadeIn(duration)
                        .play();
                }
                currentAnimationName = name;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();
            if (mixer) mixer.update(dt);

            controls.update();
            renderer.render(scene, camera);
        }

        // Handle messages from Streamlit parent
        window.addEventListener("message", (event) => {
            if (event.data.type === "streamlit:render") {
                const args = event.data.args;
                const animation = args.animation;
                if (animation && animation !== currentAnimationName) {
                    if (mixer) {
                        fadeToAction(animation, 0.5);
                    } else {
                        currentAnimationName = animation; // model not loaded yet, save for later
                    }
                }
            }
        });

        // Initialize and notify parent that we are ready
        init();
        sendToStreamlit("streamlit:componentReady", { apiVersion: 1 });
        sendToStreamlit("streamlit:setFrameHeight", { height: 500 });
    </script>
</body>

</html>
